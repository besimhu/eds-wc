name: PR Preview Branch

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: write

concurrency:
  group: pr-preview-branch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish-preview-branch:
    if: ${{ github.event.action != 'closed' && !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_BRANCH: eds-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build and apply generated runtime files
        run: npm run build:eds

      - name: Commit generated files if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -B "${PREVIEW_BRANCH}"
          git add -A blocks scripts styles

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "chore(ci): apply build output for PR #${{ github.event.pull_request.number }}"
          fi

      - name: Push preview branch
        run: git push --force-with-lease origin "HEAD:${PREVIEW_BRANCH}"

  delete-preview-branch:
    if: ${{ github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_BRANCH: eds-preview-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Delete preview branch
        run: git push origin --delete "${PREVIEW_BRANCH}" || echo "Preview branch already deleted."
